server:
  port: 8090
spring:
  application:
    name: "loans"
  profiles:
    active: "prod"
  config:
    import: "optional:configserver:http://localhost:8071/"

  datasource:
    url: jdbc:mysql://localhost:3307/loansdb
    username: root
    password: root
  jpa:
    show-sql: true
  sql:
    init:
      mode: always

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    shutdown:
      access: unrestricted
  info:
    env:
      enabled: true


eureka:
  instance:
    preferIpAddress: true
    leaseRenewalIntervalInSeconds: 30       # Heartbeat every 30s (default)
    leaseExpirationDurationInSeconds: 90   # Expire after 90s of no heartbeat
  client:
    fetchRegistry: true
    registerWithEureka: true
    serviceUrl:
      defaultZone: http://localhost:8070/eureka/
    registryFetchIntervalSeconds: 30       # How often to fetch registry
    healthcheck:
      enabled: true                        # Use /actuator/health for status


info:
  app:
    name: "loans"
    description: "Bank Loans Application"
    version: "1.0.0"
